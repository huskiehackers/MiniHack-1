<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Page Setup</title>
    
    <!-- CSS goes here inside the style tag -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Slackey&display=swap');

        body {
            font-family: "Slackey", sans-serif;
            color: #37190e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-image: url("assets/leaf-background.jpg");
            background-size: cover;
            background-position: center;
            flex-direction: column;
        }

        .typing-container {
            background-color: #64351b;
            padding: 20px;
            border-radius: 40px;
            box-shadow: 0 4px 8px;
            width: 80%;
            max-width: 600px;
            text-align: center;
            resize: none;
        }
        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 15px;
            font-size: 1em;
            background-color: #b72626;
            color: #3f0101;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }


        #svgs-container {
            position: relative;
            font-size: 1.2em;
            margin-bottom: 15px;
            padding: 10px;
            border: 1px solid #37190e;
            min-height: 100px;
            text-align: left;
            user-select: none; 
        }

        #typing-input {
            background-color: #659810;
            width: 100%;
            padding: 10px;
            font-size: 1em;
            border: 1px solid #294606;
            border-radius: 4px;
            box-sizing: border-box;
            resize: none; 
        }
        
        .results {
            margin-top: 15px;
            font-size: 1em;
            color: #37190e;
        }

        
        .svg-player {
            position: absolute;
            top: -20px;
            left: 0;
            width: 100%;
            height: 100px;
            overflow: hidden;
        }

        .svg-player svg {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            z-index: 2;
        }

        .svg-player img {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            border-radius: 50%;
            z-index: 2;
        }

        #text-to-type {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1em;
            white-space: nowrap;
            text-align: left;
            padding-left: 50px;
            z-index: 1;
            transition: left 0.2s ease;
        }

        .svg-enemy {
            position: absolute;
            top: 40px;
            left: 0px;
            display: flex;
            align-items: center;
        
            width: 100%;
            height: 100px;
        }

        .svg-enemy svg {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            z-index: 2;
        }

        .svg-enemy img {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            border-radius: 50%;
            z-index: 2;
        }

    </style>
</head>
<body>
    <!--HTML-->
    <div class="typing-container">
        <h1>Eat da word grubs!</h1>

        <!-- This is the HTML element for the timer-->
        <textarea readonly id="timerDisplay" rows = 1 placeholder="1"  style="border:none;resize:none;text-align:center;">0s</textarea>

        <div id="svgs-container">
            <div class="svg-player">
                <svg width="50" height="50">
                    <img src="assets/catepillar-runner.jpg" alt="caterpillar" width="50" height="50">
                </svg>
                <div id="text-to-type">

                </div>
            </div>
            <div class="svg-enemy">
                <svg width="50" height="50">
                    <img src="assets/fly.jpg" alt="fly" width="50" height="50">
                </svg>
                
            </div>
        </div>
        <textarea id="typing-input" rows="5" placeholder="Start typing here..." autofocus></textarea>
        <div class="results">
            <p>WPM: <span id="wpm">0</span> | Accuracy: <span id="accuracy">100%</span></p>
        </div>
        <div class="back-button" onclick="window.location.href='landing_page.html'">Back</div>
    </div>


    <!-- This is the script for the words -->
    <script src="paragraphs.js"></script>

    
    <!-- This is the script for the wordcounter -->
    <script src ="word_counter.js"></script>


    <!-- JavaScript  -->
    <script>
        /* getting input and saving it from "typing-container" */
        const textToType = document.getElementById('text-to-type');
        const typingInput = document.getElementById('typing-input');
        const wpmDisplay = document.getElementById('wpm');
        const accuracyDisplay = document.getElementById('accuracy');

        const text = paragraphs.paragraphs[Math.floor(Math.random() * paragraphs.paragraphs.length)];
        // Wrap each word in a span so we can hide them individually
        const words = text.split(' ');
        textToType.innerHTML = words
            .map((word, i) => `<span id="word-${i}">${word}</span>`)
            .join(' ');

        
        const textarea = document.getElementById("typing-input");

        

        // Block Enter key to prevent new lines
        textarea.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                e.preventDefault();
            }
        });

        // Disable pasting
        textarea.addEventListener('paste', function(event) {
            event.preventDefault(); // Stop the paste action
        });

        //everytime the user inputs something into the box, run this code.
        textarea.addEventListener("input", () => {
            
            //Update the string value
            const content = textarea.value;
            //incorrect words but only count the ones that are fully typed and wrong, not the current word being typed
            const incorrectWords = content.split(/\s+/).filter((word, i) => {
                const originalWord = words[i];
                return word.length > 0 && word !== originalWord && i < content.split(/\s+/).length - 1;
            }).length;        
            //get the number of words in the string
            word_counter(content);
            //call accuracy calculator
            accuracyDisplay.textContent = calculateAccuracy(incorrectWords, text);

            // Compare typed words to the paragraph and hide matched ones
            const typedWords = content.split(/\s+/).filter(w => w.length > 0);
            const completedCount = Math.max(0, typedWords.length - 1);

            // Determine how many words have scrolled past the left edge
            const scrollThresholdForHide = 4;
            // Only start hiding words after the user has passed the scroll threshold
            const wordsScrolledPast = completedCount > scrollThresholdForHide 
                ? completedCount - scrollThresholdForHide
                : 0;

            words.forEach((word, i) => {
                const span = document.getElementById(`word-${i}`);
                if (i < wordsScrolledPast) {
                    // Word has scrolled past the left edge — hide it
                    span.style.visibility = 'hidden';
                } else if (i < typedWords.length - 1 && typedWords[i] === word) {
                    // Fully typed & matches — gray it out
                    span.style.visibility = 'visible';
                    span.style.color = '#659810';
                } else if (i < typedWords.length - 1) {
                    // Fully typed but wrong — show in red
                    span.style.visibility = 'visible';
                    span.style.color = '#b72626';
                } else {
                    // Not yet reached — reset
                    span.style.visibility = 'visible';
                    span.style.color = '';
                }
            });

            // Scroll the text left once user passes 4 words
            const scrollThreshold = 4;
            if (completedCount > scrollThreshold) {
                // Calculate how far past the threshold we are and shift accordingly
                const wordsToShift = completedCount - scrollThreshold;
                // Measure the pixel offset of the word we need to shift to
                const targetSpan = document.getElementById(`word-${wordsToShift}`); //the span of the word we want to align to the left edge
                if (targetSpan) {
                    const offset = targetSpan.offsetLeft; //offset from the left edge of the container
                    textToType.style.left = `-${offset}px`; //shift the text left by that amount
                }
            } else {
                textToType.style.left = '0'; //reset to original position if user goes back before halfway
            }
            

        });

    </script>
    
    <!-- This is a script for the timer -->
     <script>
        let seconds = 0;
        let intervalId;
        
        function Timer() {
        seconds++;
        document.getElementById("timerDisplay").textContent = seconds + "s";
        }

        function startTimer() {
        // Call updateTimer every 1000 milliseconds (1 second)
        intervalId = setInterval(Timer, 1000);
        }

        function stopTimer() {
        // Stop the interval using the ID
        clearInterval(intervalId);
        }

        // Start the timer when the script loads
        window.onload = startTimer;
    </script>
    <!-- accuracy calculator -->

    <script>
        // Function to calculate accuracy as a percentage start at 100% and decrease based on the number of incorrect words typed
        function calculateAccuracy(incorrectWords, original) {
            const originalWords = original.trim().split(/\s+/);
            let correctCount = originalWords.length; // Start with all words correct

            // Count how many words are correct based on the number of incorrect words
            correctCount = originalWords.length - incorrectWords;

            // Calculate accuracy percentage, calculate only if the word is red and not gray
            const accuracy = (correctCount / originalWords.length) * 100;
            return accuracy.toFixed(0) + '%'; // Return accuracy as a percentage with 2 decimal places
        }
    </script>

</body>
</html>
